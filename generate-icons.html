<!DOCTYPE html>
<html>
<head><title>Generate Raiders Icons</title></head>
<body>
<canvas id="c192" width="192" height="192" style="display:none"></canvas>
<canvas id="c512" width="512" height="512" style="display:none"></canvas>
<script>
  function drawIcon(canvas, size) {
    const ctx = canvas.getContext('2d');
    const r = size * 0.12;
    // Background
    ctx.fillStyle = '#000000';
    ctx.beginPath();
    ctx.roundRect(0, 0, size, size, r);
    ctx.fill();
    // Silver border
    ctx.strokeStyle = '#A5ACAF';
    ctx.lineWidth = size * 0.02;
    ctx.beginPath();
    ctx.roundRect(size*0.04, size*0.04, size*0.92, size*0.92, r);
    ctx.stroke();
    // LV text
    ctx.fillStyle = '#A5ACAF';
    ctx.font = `900 ${size * 0.42}px 'Arial Black', Arial, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('LV', size / 2, size / 2);
  }

  const c192 = document.getElementById('c192');
  const c512 = document.getElementById('c512');
  drawIcon(c192, 192);
  drawIcon(c512, 512);

  // Auto download both
  [['icon-192.png', c192], ['icon-512.png', c512]].forEach(([name, canvas]) => {
    const a = document.createElement('a');
    a.download = name;
    a.href = canvas.toDataURL('image/png');
    a.click();
  });
</script>
<p style="font-family:sans-serif;padding:20px">Icons downloading... You can close this tab.</p>
</body>
</html>
