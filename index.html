<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Raider Nation">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Raider Nation Radio</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --raiders-silver: #A5ACAF;
      --surface: #111111;
      --surface2: #1A1A1A;
      --surface3: #242424;
      --text-primary: #F0F0F0;
      --text-muted: #888888;
    }

    html, body {
      height: 100%;
      background: #000;
      overscroll-behavior: none;
    }

    #app {
      font-family: 'Barlow', sans-serif;
      background: var(--surface);
      height: 100%;
      max-width: 430px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    .page { display: none; flex: 1; flex-direction: column; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .page.active { display: flex; }

    /* === RADIO === */
    .radio-page { background: var(--surface); align-items: center; }

    .radio-hero {
      width: 100%;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px 32px;
      padding-top: max(48px, env(safe-area-inset-top, 48px));
      position: relative;
      flex-shrink: 0;
    }

    .radio-hero::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, #A5ACAF44, transparent);
    }

    .logo-frame {
      width: 190px; height: 190px;
      border-radius: 20px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 24px;
      overflow: hidden;
    }

    .logo-frame img { width: 155px; height: 155px; object-fit: contain; }
    .logo-fallback { font-family: 'Barlow Condensed', sans-serif; font-size: 72px; font-weight: 900; color: var(--raiders-silver); display: none; }

    .station-name { font-family: 'Barlow Condensed', sans-serif; font-size: 26px; font-weight: 700; color: var(--text-primary); letter-spacing: 1px; text-align: center; margin-bottom: 6px; text-transform: uppercase; }
    .show-name { font-size: 14px; color: var(--raiders-silver); text-align: center; font-weight: 500; margin-bottom: 4px; }
    .show-time { font-size: 12px; color: var(--text-muted); text-align: center; }
    .lv-time { font-size: 11px; color: #555; text-align: center; margin-top: 4px; }

    .live-badge { display: inline-flex; align-items: center; gap: 6px; background: #1a0000; border: 1px solid #ff3333; border-radius: 20px; padding: 4px 10px; font-size: 11px; font-weight: 600; color: #ff4444; letter-spacing: 0.5px; text-transform: uppercase; margin-top: 12px; }
    .live-dot { width: 6px; height: 6px; background: #ff4444; border-radius: 50%; animation: pulse 1.5s ease-in-out infinite; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes stream-progress { 0%{width:0%} 100%{width:100%} }

    .controls-area { width: 100%; padding: 28px 32px 20px; display: flex; flex-direction: column; align-items: center; gap: 24px; flex-shrink: 0; }

    .progress-bar-wrap { width: 100%; }
    .progress-bar { width: 100%; height: 3px; background: #2a2a2a; border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; width: 0%; background: var(--raiders-silver); border-radius: 2px; }
    .time-labels { display: flex; justify-content: space-between; margin-top: 6px; font-size: 11px; color: var(--text-muted); }

    .main-controls { display: flex; align-items: center; justify-content: center; gap: 36px; }
    .ctrl-btn { background: none; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-muted); padding: 8px; }
    .ctrl-btn svg { width: 28px; height: 28px; }

    .play-btn { width: 68px; height: 68px; border-radius: 50%; background: var(--raiders-silver); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s, transform 0.1s; -webkit-tap-highlight-color: transparent; }
    .play-btn:active { transform: scale(0.93); background: #c0c7ca; }
    .play-btn svg { width: 28px; height: 28px; fill: #000; }

    .volume-row { width: 100%; display: flex; align-items: center; gap: 12px; }
    .volume-row svg { width: 18px; height: 18px; color: var(--text-muted); flex-shrink: 0; }
    .volume-slider { flex: 1; -webkit-appearance: none; height: 3px; border-radius: 2px; background: #333; outline: none; }
    .volume-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: var(--raiders-silver); cursor: pointer; }

    .schedule-strip { width: 100%; padding: 0 24px 32px; flex: 1; overflow-y: auto; }
    .schedule-label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
    .schedule-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 0.5px solid #1f1f1f; }
    .schedule-item:last-child { border-bottom: none; }
    .sched-time { font-size: 12px; color: var(--text-muted); width: 100px; flex-shrink: 0; }
    .sched-show { font-size: 13px; color: var(--text-primary); font-weight: 500; flex: 1; }
    .sched-active .sched-show, .sched-active .sched-time { color: var(--raiders-silver); }
    .sched-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--raiders-silver); flex-shrink: 0; animation: pulse 1.5s ease-in-out infinite; }

    /* === NEWS === */
    .news-page, .videos-page { background: var(--surface); }

    .page-header {
      padding: 20px 20px 12px;
      padding-top: max(20px, env(safe-area-inset-top, 20px));
      border-bottom: 0.5px solid #1f1f1f;
      flex-shrink: 0;
    }

    .page-title { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 700; color: var(--text-primary); text-transform: uppercase; letter-spacing: 0.5px; }

    .news-list, .video-grid { padding: 12px 0; flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }

    .news-card { display: flex; gap: 12px; padding: 14px 20px; border-bottom: 0.5px solid #1a1a1a; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .news-card:active { background: var(--surface2); }
    .news-thumb { width: 72px; height: 52px; border-radius: 8px; background: var(--surface3); flex-shrink: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    .news-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .news-thumb-fallback { font-size: 10px; color: var(--text-muted); text-align: center; padding: 4px; }
    .news-meta { flex: 1; min-width: 0; }
    .news-source { font-size: 10px; font-weight: 600; color: var(--raiders-silver); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .news-headline { font-size: 13px; color: var(--text-primary); line-height: 1.4; font-weight: 500; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 4px; }
    .news-time { font-size: 11px; color: var(--text-muted); }

    .loading-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; gap: 12px; color: var(--text-muted); font-size: 13px; }
    .spinner { width: 24px; height: 24px; border: 2px solid #2a2a2a; border-top-color: var(--raiders-silver); border-radius: 50%; animation: spin 0.8s linear infinite; }

    /* === VIDEOS === */
    .video-card { padding: 12px 20px; border-bottom: 0.5px solid #1a1a1a; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .video-card:active { background: var(--surface2); }
    .video-thumb-wrap { width: 100%; aspect-ratio: 16/9; border-radius: 10px; background: var(--surface3); overflow: hidden; position: relative; margin-bottom: 10px; }
    .video-thumb-wrap img { width: 100%; height: 100%; object-fit: cover; }
    .play-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.3); }
    .play-circle { width: 44px; height: 44px; border-radius: 50%; background: rgba(0,0,0,0.7); border: 1.5px solid rgba(255,255,255,0.6); display: flex; align-items: center; justify-content: center; }
    .play-circle svg { width: 18px; height: 18px; fill: white; margin-left: 2px; }
    .video-title { font-size: 13px; color: var(--text-primary); font-weight: 500; line-height: 1.4; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .video-date { font-size: 11px; color: var(--text-muted); }

    /* === TAB NAV === */
    .tab-nav {
      display: flex;
      background: #0a0a0a;
      border-top: 0.5px solid #1f1f1f;
      flex-shrink: 0;
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }

    .tab-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 10px 8px 12px; background: none; border: none; cursor: pointer; color: var(--text-muted); transition: color 0.15s; font-family: 'Barlow', sans-serif; -webkit-tap-highlight-color: transparent; }
    .tab-btn.active { color: var(--raiders-silver); }
    .tab-btn svg { width: 22px; height: 22px; }
    .tab-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

    /* === NEWS MODAL === */
    #article-modal { display: none; position: absolute; inset: 0; background: #000; z-index: 100; flex-direction: column; }
    #article-modal.open { display: flex; }
    .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; padding-top: max(16px, env(safe-area-inset-top, 16px)); border-bottom: 0.5px solid #1f1f1f; }
    .modal-close { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 28px; line-height: 1; padding: 4px; -webkit-tap-highlight-color: transparent; }
    .modal-source { font-size: 12px; font-weight: 600; color: var(--raiders-silver); text-transform: uppercase; letter-spacing: 0.5px; }
    .modal-body { flex: 1; overflow-y: auto; padding: 20px; -webkit-overflow-scrolling: touch; }
    .modal-headline { font-size: 17px; font-weight: 600; color: var(--text-primary); line-height: 1.5; margin-bottom: 10px; }
    .modal-time { font-size: 12px; color: var(--text-muted); margin-bottom: 20px; }
    .modal-link { display: inline-block; font-size: 13px; color: var(--raiders-silver); border: 0.5px solid #333; padding: 10px 20px; border-radius: 8px; text-decoration: none; }

    audio { display: none; }
  </style>
</head>
<body>
<div id="app">
  <audio id="radio-audio" preload="none"></audio>

  <!-- RADIO PAGE -->
  <div class="page radio-page active" id="page-radio">
    <div class="radio-hero">
      <div class="logo-frame">
        <img src="https://a.espncdn.com/i/teamlogos/nfl/500-dark/lv.png" alt="Raiders"
             onerror="this.style.display='none';document.getElementById('logo-fb').style.display='block'">
        <div class="logo-fallback" id="logo-fb">LV</div>
      </div>
      <div class="station-name">Raider Nation Radio</div>
      <div class="show-name" id="current-show-name">Loading...</div>
      <div class="show-time" id="current-show-time"></div>
      <div class="lv-time" id="lv-time"></div>
      <div class="live-badge"><div class="live-dot"></div>Live</div>
    </div>

    <div class="controls-area">
      <div class="progress-bar-wrap">
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        <div class="time-labels"><span>Live Stream · Las Vegas, NV</span><span id="stream-status">—</span></div>
      </div>
      <div class="main-controls">
        <button class="ctrl-btn" title="Live stream">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" opacity="0.3">
            <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.46"/>
          </svg>
        </button>
        <button class="play-btn" id="play-btn" onclick="togglePlay()">
          <svg id="play-icon" viewBox="0 0 24 24"><path d="M5 3l14 9-14 9V3z"/></svg>
        </button>
        <button class="ctrl-btn" title="Live stream">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" opacity="0.3">
            <polyline points="23 4 23 10 17 10"/><path d="M20.49 15A9 9 0 1 1 20 10.55"/>
          </svg>
        </button>
      </div>
      <div class="volume-row">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        </svg>
        <input type="range" class="volume-slider" min="0" max="100" value="80" oninput="setVolume(this.value)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
        </svg>
      </div>
    </div>

    <div class="schedule-strip">
      <div class="schedule-label">Today's Schedule · Las Vegas Time</div>
      <div id="schedule-list"></div>
    </div>
  </div>

  <!-- NEWS PAGE -->
  <div class="page news-page" id="page-news">
    <div class="page-header"><div class="page-title">Raiders News</div></div>
    <div class="news-list" id="news-list">
      <div class="loading-state"><div class="spinner"></div><span>Loading news...</span></div>
    </div>
  </div>

  <!-- VIDEOS PAGE -->
  <div class="page videos-page" id="page-videos">
    <div class="page-header"><div class="page-title">Raiders Videos</div></div>
    <div class="video-grid" id="video-grid">
      <div class="loading-state"><div class="spinner"></div><span>Loading videos...</span></div>
    </div>
  </div>

  <!-- ARTICLE MODAL -->
  <div id="article-modal">
    <div class="modal-header">
      <div class="modal-source" id="modal-source"></div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="modal-headline" id="modal-headline"></div>
      <div class="modal-time" id="modal-time"></div>
      <a class="modal-link" id="modal-link" target="_blank">Read full article →</a>
    </div>
  </div>

  <!-- TAB NAV -->
  <nav class="tab-nav">
    <button class="tab-btn active" id="tab-radio" onclick="switchTab('radio')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <circle cx="12" cy="12" r="2"/>
        <path d="M16.24 7.76a6 6 0 0 1 0 8.49"/><path d="M7.76 7.76a6 6 0 0 0 0 8.49"/>
        <path d="M20.07 4.93a10 10 0 0 1 0 14.14"/><path d="M3.93 4.93a10 10 0 0 0 0 14.14"/>
      </svg>
      <span class="tab-label">Radio</span>
    </button>
    <button class="tab-btn" id="tab-news" onclick="switchTab('news')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 0-2 2z"/>
        <line x1="8" y1="7" x2="14" y2="7"/><line x1="8" y1="12" x2="14" y2="12"/><line x1="8" y1="17" x2="14" y2="17"/>
      </svg>
      <span class="tab-label">News</span>
    </button>
    <button class="tab-btn" id="tab-videos" onclick="switchTab('videos')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/>
      </svg>
      <span class="tab-label">Videos</span>
    </button>
  </nav>
</div>

<script>
  const STREAM_URL = 'https://nfl-live.streamguys1.com/raiders/raiders.mp3';
  const YOUTUBE_API_KEY = 'AIzaSyADrpI_gwQMWSnhl_RbIla5G08_Hjpe5W0';
  const RAIDERS_CHANNEL_ID = 'UCGKhFCmrBNzFHMvbfGO79DQ';
  const RSS2JSON = 'https://api.rss2json.com/v1/api.json?rss_url=';
  const LV_TZ = 'America/Los_Angeles';

  const SCHEDULE = [
    { show: 'The Morning Tailgate', start: 7*60, end: 10*60 },
    { show: 'The Rich Eisen Show', start: 10*60, end: 12*60 },
    { show: 'The JT the Brick Show', start: 12*60, end: 14*60 },
    { show: 'Unnecessary Roughness', host: 'hosted by Your Boy Q', start: 14*60, end: 17*60 },
  ];

  const RSS_FEEDS = [
    { url: 'https://www.raiders.com/rss/news', label: 'Raiders.com' },
    { url: 'https://www.espn.com/espn/rss/nfl/news', label: 'ESPN' },
    { url: 'https://www.nfl.com/rss/rsslanding?contentType=news', label: 'NFL.com' },
  ];

  const audio = document.getElementById('radio-audio');
  audio.src = STREAM_URL;
  let isPlaying = false;

  function getLVMinutes() {
    const lvStr = new Date().toLocaleString('en-US', { timeZone: LV_TZ, hour: 'numeric', minute: 'numeric', hour12: false });
    const [h, m] = lvStr.split(':').map(Number);
    return h * 60 + m;
  }

  function getLVTimeDisplay() {
    return new Date().toLocaleString('en-US', { timeZone: LV_TZ, hour: 'numeric', minute: '2-digit', hour12: true, timeZoneName: 'short' });
  }

  function fmtPT(m) {
    const h = Math.floor(m / 60), min = m % 60, ampm = h >= 12 ? 'pm' : 'am';
    return `${h > 12 ? h - 12 : h || 12}:${String(min).padStart(2, '0')}${ampm}`;
  }

  function updateSchedule() {
    const nowMin = getLVMinutes();
    const current = SCHEDULE.find(s => nowMin >= s.start && nowMin < s.end);
    document.getElementById('current-show-name').textContent = current ? current.show : 'Raider Nation Radio';
    document.getElementById('current-show-time').textContent = current
      ? (current.host || `${fmtPT(current.start)} – ${fmtPT(current.end)} PT`)
      : 'On Air Now';
    document.getElementById('lv-time').textContent = `Las Vegas: ${getLVTimeDisplay()}`;
    document.getElementById('schedule-list').innerHTML = SCHEDULE.map(s => {
      const active = current && current.show === s.show;
      return `<div class="schedule-item${active ? ' sched-active' : ''}">
        <span class="sched-time">${fmtPT(s.start)} – ${fmtPT(s.end)}</span>
        <span class="sched-show">${s.show}</span>
        ${active ? '<div class="sched-dot"></div>' : ''}
      </div>`;
    }).join('');
  }

  function togglePlay() {
    if (isPlaying) {
      audio.pause();
      isPlaying = false;
      document.getElementById('play-icon').innerHTML = '<path d="M5 3l14 9-14 9V3z"/>';
      document.getElementById('stream-status').textContent = 'Paused';
      document.getElementById('progress-fill').style.animation = 'none';
      document.getElementById('progress-fill').style.width = '0%';
    } else {
      audio.play().catch(() => {});
      isPlaying = true;
      document.getElementById('play-icon').innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
      document.getElementById('stream-status').textContent = 'Streaming';
      document.getElementById('progress-fill').style.animation = 'stream-progress 20s linear infinite';
    }
  }

  function setVolume(v) { audio.volume = v / 100; }

  function switchTab(tab) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('page-' + tab).classList.add('active');
    document.getElementById('tab-' + tab).classList.add('active');
    if (tab === 'news' && document.getElementById('news-list').querySelector('.loading-state')) loadNews();
    if (tab === 'videos' && document.getElementById('video-grid').querySelector('.loading-state')) loadVideos();
  }

  function timeAgo(date) {
    const diff = (Date.now() - date) / 1000;
    if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
    if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
    if (diff < 604800) return `${Math.floor(diff / 86400)}d ago`;
    return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }

  async function loadNews() {
    const list = document.getElementById('news-list');
    let all = [];
    for (const feed of RSS_FEEDS) {
      try {
        const res = await fetch(`${RSS2JSON}${encodeURIComponent(feed.url)}&count=10`);
        const data = await res.json();
        if (data.items) all.push(...data.items.map(i => ({ ...i, source: feed.label })));
      } catch (e) {}
    }
    all.sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));
    if (!all.length) { list.innerHTML = '<div class="loading-state"><span>Could not load news.</span></div>'; return; }
    window._newsItems = all;
    list.innerHTML = all.map((item, i) => {
      const thumb = item.thumbnail || item.enclosure?.link || '';
      return `<div class="news-card" onclick="openArticle(${i})">
        <div class="news-thumb">${thumb ? `<img src="${thumb}" onerror="this.parentElement.innerHTML='<div class=news-thumb-fallback>LV</div>'">` : '<div class="news-thumb-fallback">LV</div>'}</div>
        <div class="news-meta">
          <div class="news-source">${item.source}</div>
          <div class="news-headline">${item.title}</div>
          <div class="news-time">${timeAgo(new Date(item.pubDate))}</div>
        </div>
      </div>`;
    }).join('');
  }

  function openArticle(i) {
    const item = window._newsItems[i];
    document.getElementById('modal-source').textContent = item.source;
    document.getElementById('modal-headline').textContent = item.title;
    document.getElementById('modal-time').textContent = new Date(item.pubDate).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
    document.getElementById('modal-link').href = item.link;
    document.getElementById('article-modal').classList.add('open');
  }

  function closeModal() { document.getElementById('article-modal').classList.remove('open'); }

  async function loadVideos() {
    const grid = document.getElementById('video-grid');
    try {
      const res = await fetch(`https://www.googleapis.com/youtube/v3/search?key=${YOUTUBE_API_KEY}&channelId=${RAIDERS_CHANNEL_ID}&part=snippet&order=date&maxResults=12&type=video`);
      const data = await res.json();
      if (!data.items || !data.items.length) throw new Error('no items');
      grid.innerHTML = data.items.map(v => `
        <div class="video-card" onclick="window.open('https://youtube.com/watch?v=${v.id.videoId}','_blank')">
          <div class="video-thumb-wrap">
            <img src="${v.snippet.thumbnails.medium.url}" loading="lazy">
            <div class="play-overlay"><div class="play-circle"><svg viewBox="0 0 24 24"><path d="M5 3l14 9-14 9V3z"/></svg></div></div>
          </div>
          <div class="video-title">${v.snippet.title}</div>
          <div class="video-date">${timeAgo(new Date(v.snippet.publishedAt))}</div>
        </div>`).join('');
    } catch (e) {
      grid.innerHTML = '<div class="loading-state"><span>Could not load videos.</span></div>';
    }
  }

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }

  updateSchedule();
  setInterval(updateSchedule, 30000);
</script>
</body>
</html>
